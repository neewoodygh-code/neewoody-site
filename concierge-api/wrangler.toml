name = "concierge-api"
main = "src/index.js"
compatibility_date = "2026-07-01"

# ── D1: member database ───────────────────────────────────────────────
# Create it once with:  wrangler d1 create concierge
# then paste the returned database_id below (it is safe to commit — it is
# an identifier, not a secret).
[[d1_databases]]
binding = "DB"
database_name = "concierge"
database_id = "25f1c339-c3f0-4398-89d1-0f3f62b7c89f"

# ── R2: shared media bucket (member photos live under concierge/ prefix)
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "neewoody-media"

[observability]
enabled = true

# ── Cron: scan for overdue safety call-outs every 15 minutes ───────────
[triggers]
crons = ["*/15 * * * *"]

# SESSION_SECRET is NOT set here. Set it out-of-band and never commit it:
#   wrangler secret put SESSION_SECRET
