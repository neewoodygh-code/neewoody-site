name = "concierge-api"
main = "src/index.js"
compatibility_date = "2026-07-01"

# ── D1: member database ───────────────────────────────────────────────
# Create it once with:  wrangler d1 create concierge
# then paste the returned database_id below (it is safe to commit — it is
# an identifier, not a secret).
[[d1_databases]]
binding = "DB"
database_name = "concierge"
database_id = "25f1c339-c3f0-4398-89d1-0f3f62b7c89f"

# ── R2: shared media bucket (member photos live under concierge/ prefix)
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "neewoody-media"

[observability]
enabled = true

# ── Cron ───────────────────────────────────────────────────────────────
#   */15 * * * *  — scan for overdue safety call-outs
#   0 3 * * 0     — weekly full D1 snapshot to R2 (backupDatabase) — TEMPORARILY
#     removed: the Cloudflare schedules API errored on deploy (2026-07-21). The
#     backupDatabase() code is live; re-add "0 3 * * 0" here + redeploy when the
#     API is healthy, or trigger the backup manually (dashboard → Triggers).
[triggers]
crons = ["*/15 * * * *"]

# SESSION_SECRET is NOT set here. Set it out-of-band and never commit it:
#   wrangler secret put SESSION_SECRET
