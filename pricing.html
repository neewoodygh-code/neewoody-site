  <link rel="preconnect" href="https://fonts.googleapis.com"/>

      --bg:#F7F4EF; --bg-alt:#EFEBE3; --surface:#FFFFFF;

<script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ── Config ────────────────────────────────────────────────────────────
const API     = 'https://neewoodygh.com/api';
const API_KEY = 'nwd-dispatch-2024';
const SESSION = 'nwd-pricing-session';

// ── Constants ─────────────────────────────────────────────────────────
const OVERHEAD_PER_DAY = 274;

const TIERS = [
  { id:'basic',    label:'Basic Build',    sub:'Just the essentials',     mult:1.45, nuerRate:200 },
  { id:'standard', label:'Standard Build', sub:'Functional & presentable', mult:1.65, nuerRate:400 },
  { id:'premium',  label:'Premium',        sub:'We take our time',         mult:1.90, nuerRate:600 },
  { id:'luxury',   label:'Luxury',         sub:'At your beck and call',    mult:2.10, nuerRate:700 },
];

const ADDONS = [
  { id:'rush',          label:'Rush',          pct:20 },
  { id:'customDesign',  label:'Custom design', pct:12 },
  { id:'cnc',           label:'CNC / carved',  pct:18 },
  { id:'remoteInstall', label:'Remote install', pct:8  },
];

const LABOUR_RATES = { supervisor:200, lead:150, hand:100, trainee:50 };
const LABOUR_ROLES = [
  { id:'supervisor', label:'Supervisor (Kevin)' },
  { id:'lead',       label:'Lead apprentice' },
  { id:'hand',       label:'Work hand' },
  { id:'trainee',    label:'Trainee' },
];

const DEFAULT_MATERIALS = [
  { id:'m01', name:'Boards',                   cab:true,  hw:false },
  { id:'m02', name:'Back panels',              cab:true,  hw:false },
  { id:'m03', name:'Edge band',                cab:true,  hw:false },
  { id:'m04', name:'Edge banding application', cab:true,  hw:false },
  { id:'m05', name:'Cutting (machine shop)',   cab:true,  hw:false },
  { id:'m06', name:'Timber',                   cab:false, hw:true  },
  { id:'m07', name:'Stain',                    cab:false, hw:true  },
  { id:'m08', name:'Finishes',                 cab:false, hw:true  },
  { id:'m09', name:'Joinery hardware',         cab:false, hw:true  },
  { id:'m10', name:'Fixtures',                 cab:true,  hw:true  },
  { id:'m11', name:'Finishing materials',      cab:true,  hw:true  },
  { id:'m12', name:'Abrasives',                cab:true,  hw:true  },
  { id:'m13', name:'Consumables',              cab:true,  hw:true  },
  { id:'m14', name:'Protective packaging',     cab:true,  hw:true  },
  { id:'m15', name:'Wood filler / grain filler', cab:false, hw:true },
];

const OPTIONAL_MATERIALS = [
  { id:'o01', name:'Stone material' },
  { id:'o02', name:'Stone fabrication' },
  { id:'o03', name:'Templates / jigs' },
  { id:'o04', name:'Glass' },
];

const EXP_CATS = ['materials','labour','logistics','overhead','other'];

const STATUS_META = {
  draft:    { label:'Draft',    color:'var(--muted)' },
  sent:     { label:'Sent',     color:'var(--warn)'  },
  accepted: { label:'Accepted', color:'var(--ok)'    },
  declined: { label:'Declined', color:'var(--err)'   },
};

// ── Utils ─────────────────────────────────────────────────────────────
const uid  = () => Math.random().toString(36).slice(2,8).toUpperCase();
const GHS  = n  => `GH₵\u202f${(+n||0).toLocaleString('en-GH',{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtDate = iso => new Date(iso).toLocaleDateString('en-GH',{day:'numeric',month:'short',year:'numeric'});

const makeMat = (def, jobType) => ({
  id: def.id, name: def.name, cab: def.cab, hw: def.hw,
  on: jobType === 'cabinetry' ? def.cab : def.hw,
  qty: 1, unitPrice: 0,
  expanded: false, subItems: [],
});
const makeOpt = def => ({
  id: def.id, name: def.name,
  on: false, qty: 1, unitPrice: 0,
  expanded: false, subItems: [],
});

const matTotal = m => {
  if (m.subItems && m.subItems.length > 0)
    return m.subItems.reduce((s,si) => s + (si.qty||0)*(si.unitPrice||0), 0);
  return (m.qty||0) * (m.unitPrice||0);
};

// ── API ───────────────────────────────────────────────────────────────
async function apiFetch(path, method='GET', body){
  const r = await fetch(`${API}${path}`,{
    method,
    headers:{'X-NWD-Key':API_KEY,...(body?{'Content-Type':'application/json'}:{})},
    ...(body?{body:JSON.stringify(body)}:{})
  });
  return r.json();
}
const loadKV  = async (key,fb) => { try{const d=await apiFetch(`/${key}`);return d!==null?d:fb;}catch{return fb;} };
const saveKV  = async (key,data) => { try{await apiFetch(`/${key}`,'PUT',data);}catch(e){console.error(e);} };

const getSession = () => { try{return JSON.parse(localStorage.getItem(SESSION));}catch{return null;} };
const setSession = u => localStorage.setItem(SESSION,JSON.stringify({id:u.id,name:u.name,role:u.role}));
const clearSession = () => localStorage.removeItem(SESSION);

// ── Pricing Engine ────────────────────────────────────────────────────
function calcQuote(q){
  const tier = TIERS.find(t=>t.id===q.tierId) || TIERS[1];
  const totalDays = (q.workshopDays||0)+(q.siteDays||0);
  const overhead  = OVERHEAD_PER_DAY * totalDays;
  let labour = 0;
  (q.crew||[]).forEach(r=>{ labour += (LABOUR_RATES[r.roleId]||0)*(r.count||0)*(r.days||totalDays); });
  if(q.includeNuer) labour += tier.nuerRate*(q.nuerDays||totalDays);
  const allMats = [...(q.materials||[]),...(q.optionals||[])];
  const matAmt = allMats.filter(m=>m.on).reduce((s,m)=>s+matTotal(m),0);
  const log = q.logistics||{};
  const logistics = (+log.primary||0) + (+log.secondary||0)*(log.secondaryReturn?2:1) + (+log.siteVisits||0)*(+log.siteVisitCost||0);
  const rawCost = overhead+labour+matAmt+logistics;
  let addOnMult=1;
  Object.entries(q.addOns||{}).forEach(([id,on])=>{if(on){const a=ADDONS.find(x=>x.id===id);if(a)addOnMult*=1+(a.pct/100);}});
  const quotedPrice = rawCost*tier.mult*addOnMult;
  const grossMargin = quotedPrice-rawCost;
  const marginPct   = quotedPrice>0?(grossMargin/quotedPrice)*100:0;
  return {overhead,labour,matAmt,logistics,rawCost,tier,addOnMult,quotedPrice,grossMargin,marginPct};
}

function calcActual(exp=[]){
  return EXP_CATS.reduce((acc,cat)=>{
    acc[cat]=exp.filter(e=>e.category===cat).reduce((s,e)=>s+(+e.amount||0),0);
    return acc;
  },{});
}

// ── Design tokens ─────────────────────────────────────────────────────
const S = {
  bg:'#F7F4EF', bgAlt:'#EFEBE3', surface:'#FFFFFF',
  dark:'#1C1A17', mid:'#4A4540', muted:'#8A8178',
  accent:'#A0784A', accentDk:'#7D5C34', accentLt:'rgba(160,120,74,.12)',
  border:'#DDD5C8', borderDk:'#C8BFB2',
  ok:'#5a8a5a', err:'#b04030', warn:'#8a6020',
};
const FD = "'Playfair Display',Georgia,serif";
const FB = "'DM Sans',system-ui,sans-serif";
const FM = "'DM Mono','Courier New',monospace";

// ── UI Primitives ─────────────────────────────────────────────────────
const Btn=({ch,onClick,color,outline,full,disabled,size='md',style:st={}})=>{
  const p=size==='lg'?'14px 22px':size==='sm'?'5px 11px':'8px 16px';
  const fs=size==='lg'?'1rem':size==='sm'?'.72rem':'.82rem';
  const base={border:'none',borderRadius:4,padding:p,fontFamily:FB,fontWeight:600,fontSize:fs,letterSpacing:'.02em',cursor:disabled?'not-allowed':'pointer',width:full?'100%':'auto',transition:'all .15s',...st};
  if(outline) return <button onClick={onClick} disabled={disabled} style={{...base,background:'transparent',color:color||S.mid,border:`1.5px solid ${S.border}`,opacity:disabled?.4:1}}>{ch}</button>;
  return <button onClick={onClick} disabled={disabled} style={{...base,background:disabled?S.bgAlt:(color||S.dark),color:disabled?S.muted:'#fff',opacity:disabled?.6:1}}>{ch}</button>;
};

const Card=({ch,style:st={}})=><div style={{background:S.surface,border:`1.5px solid ${S.border}`,borderRadius:10,padding:'14px 16px',...st}}>{ch}</div>;

// Stable input components - defined outside any render function to prevent remounting
const TextInp = React.memo(({value,onChange,onBlur,placeholder,style:st={},type='text',...rest})=>(
  <input type={type} defaultValue={value} onChange={onChange} onBlur={onBlur}
    placeholder={placeholder||''}
    style={{background:S.bgAlt,border:`1.5px solid ${S.border}`,borderRadius:4,color:S.dark,
      padding:'7px 10px',fontFamily:FM,fontSize:'.88rem',outline:'none',width:'100%',...st}}
    {...rest}/>
));

const NumInp = React.memo(({value,onChange,placeholder,style:st={},...rest})=>(
  <input type="number" min={0} defaultValue={value===0?'':value}
    onChange={onChange} placeholder={placeholder||'0'}
    style={{background:S.bgAlt,border:`1.5px solid ${S.border}`,borderRadius:4,color:S.dark,
      padding:'7px 10px',fontFamily:FM,fontSize:'.88rem',outline:'none',width:'100%',...st}}
    {...rest}/>
));

const CtrlInp=({value,onChange,placeholder,style:st={},...rest})=>(
  <input value={value||''} onChange={onChange} placeholder={placeholder||''}
    style={{background:S.bgAlt,border:`1.5px solid ${S.border}`,borderRadius:4,color:S.dark,
      padding:'7px 10px',fontFamily:FB,fontSize:'.88rem',outline:'none',width:'100%',...st}}
    {...rest}/>
);

const CtrlSel=({value,onChange,children,style:st={}})=>(
  <select value={value} onChange={onChange}
    style={{background:S.bgAlt,border:`1.5px solid ${S.border}`,borderRadius:4,color:S.dark,
      padding:'7px 10px',fontFamily:FB,fontSize:'.88rem',outline:'none',width:'100%',appearance:'none',...st}}>
    {children}
  </select>
);

const CtrlTA=({value,onChange,placeholder,rows=3,style:st={}})=>(
  <textarea value={value||''} onChange={onChange} placeholder={placeholder} rows={rows}
    style={{background:S.bgAlt,border:`1.5px solid ${S.border}`,borderRadius:4,color:S.dark,
      padding:'7px 10px',fontFamily:FB,fontSize:'.88rem',outline:'none',width:'100%',resize:'vertical',...st}}/>
);

const Lbl=({ch})=><div style={{fontSize:'.65rem',letterSpacing:'.12em',color:S.muted,textTransform:'uppercase',marginBottom:5,fontFamily:FM,fontWeight:500}}>{ch}</div>;

const Hdr=({title,sub,onBack,right})=>(
  <div style={{padding:'13px 18px',borderBottom:`1.5px solid ${S.border}`,background:S.surface,flexShrink:0,display:'flex',justifyContent:'space-between',alignItems:'center',position:'sticky',top:0,zIndex:10,boxShadow:'0 1px 4px rgba(28,26,23,.06)'}}>
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      {onBack&&<button onClick={onBack} style={{background:'transparent',border:'none',color:S.muted,cursor:'pointer',fontSize:'.82rem',fontFamily:FB}}>← back</button>}
      <div>
        <div style={{fontFamily:FD,fontSize:'1.05rem',fontWeight:600,color:S.dark}}>{title}</div>
        {sub&&<div style={{fontSize:'.72rem',color:S.muted,fontFamily:FM,marginTop:2}}>{sub}</div>}

    </div>
    {right||<div/>}

);

const MarginBar=({pct,label='Gross margin'})=>{
  const color=pct>=35?S.ok:pct>=20?S.warn:S.err;
  return(
    <div style={{marginTop:12}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
        <span style={{fontSize:'.65rem',letterSpacing:'.12em',color:S.muted,fontFamily:FM,textTransform:'uppercase'}}>{label}</span>

      </div>
      <div style={{height:4,background:S.bgAlt,borderRadius:2,overflow:'hidden'}}>

      </div>
      {pct<30&&<div style={{fontSize:'.68rem',color:S.warn,fontFamily:FM,marginTop:4}}>Margin below 30% — consider raising tier or add-ons</div>}
    </div>

};

const Row=({label,value,bold,color,indent})=>(
  <div style={{display:'flex',justifyContent:'space-between',padding:'5px 0',borderBottom:`1px solid ${S.border}`,paddingLeft:indent?10:0}}>
    <span style={{fontSize:'.82rem',fontFamily:FB,color:S.muted}}>{label}</span>
    <span style={{fontSize:'.82rem',fontFamily:FM,fontWeight:bold?600:400,color:color||S.dark}}>{value}</span>

);

// ── PIN Screen ────────────────────────────────────────────────────────
function PinScreen({user,onSuccess,onBack}){
  const isFirst=!user.pin;
  const [step,setStep]=useState('enter');
  const [p1,setP1]=useState('');
  const [p2,setP2]=useState('');
  const [shake,setShake]=useState(false);
  const cur=step==='confirm'?p2:p1;
  const press=d=>{
    if(step==='enter'){
      if(p1.length>=4)return;
      const np=p1+d;setP1(np);
      if(np.length===4){
        if(isFirst)setStep('confirm');
        else if(np===user.pin)onSuccess();
        else{setShake(true);setTimeout(()=>{setP1('');setShake(false);},700);}
      }
    } else {
      if(p2.length>=4)return;
      const np=p2+d;setP2(np);
      if(np.length===4){
        if(np===p1)onSuccess(np);
        else{setShake(true);setTimeout(()=>{setP2('');setShake(false);},700);}
      }
    }
  };
  const del=()=>{if(step==='enter')setP1(p=>p.slice(0,-1));else setP2(p=>p.slice(0,-1));};
  return(
    <div style={{minHeight:'100vh',background:S.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:300}}>
        <div style={{fontFamily:FD,fontSize:'1.6rem',fontWeight:600,color:S.dark,textAlign:'center',marginBottom:4}}>Neewoody</div>
        <div style={{fontFamily:FM,fontSize:'.7rem',letterSpacing:'.14em',color:S.accent,textAlign:'center',marginBottom:32,textTransform:'uppercase'}}>Pricing</div>
        <div style={{fontSize:'.82rem',color:S.muted,textAlign:'center',marginBottom:24,fontFamily:FB}}>
          {isFirst?(step==='enter'?'Set your admin PIN':'Confirm PIN'):'Admin PIN'}
        </div>
        <div style={{display:'flex',gap:14,justifyContent:'center',marginBottom:30,transform:shake?'translateX(6px)':'none',transition:'transform .08s'}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:10,height:10,borderRadius:'50%',background:cur.length>i?(shake?S.err:S.accent):S.border,transition:'background .15s'}}/>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:8}}>
          {[1,2,3,4,5,6,7,8,9].map(n=>(
            <button key={n} onClick={()=>press(String(n))} style={{background:S.surface,border:`1.5px solid ${S.border}`,borderRadius:8,color:S.dark,padding:14,fontFamily:FM,fontSize:'1.1rem',cursor:'pointer'}}>{n}</button>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
          <div/>
          <button onClick={()=>press('0')} style={{background:S.surface,border:`1.5px solid ${S.border}`,borderRadius:8,color:S.dark,padding:14,fontFamily:FM,fontSize:'1.1rem',cursor:'pointer'}}>0</button>
          <button onClick={del} style={{background:'transparent',border:`1.5px solid ${S.border}`,borderRadius:8,color:S.muted,padding:14,fontSize:'.9rem',cursor:'pointer'}}>⌫</button>
        </div>
        {onBack&&<button onClick={()=>{if(step==='confirm'){setStep('enter');setP2('');}else onBack();}} style={{display:'block',width:'100%',marginTop:14,background:'transparent',border:'none',color:S.muted,fontSize:'.82rem',cursor:'pointer',fontFamily:FB}}>← {step==='confirm'?'re-enter':'back'}</button>}
      </div>
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────
function Dashboard({quotes,onNew,onOpen,onLogout}){
  const [filter,setFilter]=useState('all');
  const filtered=filter==='all'?quotes:quotes.filter(q=>q.status===filter);
  return(
    <div style={{minHeight:'100vh',background:S.bg,display:'flex',flexDirection:'column'}}>
      <Hdr title="Pricing" sub="Neewoody Custom Woodwork"
        right={<div style={{display:'flex',gap:8,alignItems:'center'}}>
          <Btn ch="+ New Quote" onClick={onNew} size="sm" color={S.accent}/>
          <button onClick={onLogout} style={{background:'transparent',border:'none',color:S.muted,fontSize:'.75rem',cursor:'pointer',fontFamily:FB}}>Exit</button>
        </div>}/>
      <div style={{display:'flex',gap:0,borderBottom:`1.5px solid ${S.border}`,overflowX:'auto',flexShrink:0,background:S.surface}}>
        {['all',...Object.keys(STATUS_META)].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{background:'transparent',border:'none',marginBottom:-1,borderBottom:filter===f?`2px solid ${S.accent}`:'2px solid transparent',color:filter===f?S.accent:S.muted,padding:'9px 16px',fontFamily:FB,fontSize:'.78rem',fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>
            {f==='all'?'All':STATUS_META[f].label}
          </button>
        ))}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:16,maxWidth:700,width:'100%',margin:'0 auto'}}>
        {filtered.length===0&&<div style={{color:S.muted,fontSize:'.85rem',fontFamily:FB,padding:'32px 0',textAlign:'center'}}>No quotes yet. Create your first one.</div>}
        <div style={{display:'flex',flexDirection:'column',gap:10,paddingTop:4}}>
          {[...filtered].reverse().map(q=>{
            const calc=calcQuote(q);
            const sm=STATUS_META[q.status]||STATUS_META.draft;
            return(
              <Card key={q.id} ch={<div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                  <div>
                    <div style={{fontFamily:FD,fontSize:'1.15rem',fontWeight:600,color:S.dark}}>{q.client||'Untitled'}</div>
                    <div style={{fontSize:'.72rem',color:S.muted,fontFamily:FM,marginTop:2}}>{q.refId} · {q.jobType==='cabinetry'?'Cabinetry':'Hardwood'} · {q.createdAt?fmtDate(q.createdAt):''}</div>
                  </div>
                  <span style={{fontSize:'.68rem',fontWeight:600,color:sm.color,fontFamily:FM,background:`${sm.color}18`,padding:'3px 8px',borderRadius:4}}>{sm.label}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:10}}>
                  <div>
                    <div style={{fontSize:'.78rem',color:S.muted,fontFamily:FB}}>{TIERS.find(t=>t.id===q.tierId)?.label||'—'} · {(q.workshopDays||0)+(q.siteDays||0)} days</div>
                    <div style={{fontFamily:FD,fontSize:'1.3rem',fontWeight:600,color:S.accent,marginTop:2}}>{GHS(calc.quotedPrice)}</div>
                  </div>
                  <Btn ch="Open →" onClick={()=>onOpen(q.id)} size="sm" outline/>
                </div>
              </div>}/>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ── New Quote Factory ──────────────────────────────────────────────────
function newQuote(refNum){
  return {
    id:uid(), refId:`NWD-${String(refNum).padStart(3,'0')}`,
    client:'', jobType:'cabinetry', status:'draft',
    createdAt:new Date().toISOString(),
    tierId:'standard',
    workshopDays:0, siteDays:0,
    crew:[{id:uid(),roleId:'supervisor',count:1,days:null},{id:uid(),roleId:'hand',count:1,days:null}],
    includeNuer:true, nuerDays:null,
    materials:DEFAULT_MATERIALS.map(m=>makeMat(m,'cabinetry')),
    optionals:OPTIONAL_MATERIALS.map(makeOpt),
    addOns:{},
    logistics:{primary:'',secondary:'',secondaryReturn:false,siteVisits:'',siteVisitCost:''},
    expenditure:[],
    notes:'',
    taxRate:15,
    idleBuffer:20,
  };
}

// ── Quote Editor ───────────────────────────────────────────────────────
function QuoteEditor({quote:initial,onSave,onBack}){
  const [q,setQ]=useState(initial);
  const [tab,setTab]=useState('setup');
  const [saving,setSaving]=useState(false);
  const upd=u=>setQ(prev=>({...prev,...u}));
  const totalDays=(q.workshopDays||0)+(q.siteDays||0);
  const calc=useMemo(()=>calcQuote(q),[q]);
  const save=async()=>{setSaving(true);await onSave(q);setSaving(false);};
  const sm=STATUS_META[q.status]||STATUS_META.draft;
  const TABS=[
    {id:'setup',l:'Setup'},
    {id:'materials',l:'Materials'},
    {id:'logistics',l:'Logistics'},
    {id:'summary',l:'Summary'},
    {id:'costs',l:'Actual Costs'},
    {id:'notes',l:'Notes'},
  ];
  return(
    <div style={{minHeight:'100vh',background:S.bg,display:'flex',flexDirection:'column'}}>
      <Hdr title={q.refId} sub={q.client||'New quote'} onBack={onBack}
        right={<div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:'.68rem',fontWeight:600,color:sm.color,fontFamily:FM,background:`${sm.color}18`,padding:'3px 8px',borderRadius:4}}>{sm.label}</span>
          <Btn ch={saving?'Saving…':'Save'} onClick={save} disabled={saving} size="sm" color={S.accent}/>
        </div>}/>
      <div style={{display:'flex',borderBottom:`1.5px solid ${S.border}`,overflowX:'auto',flexShrink:0,background:S.surface}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:'transparent',border:'none',marginBottom:-1,borderBottom:tab===t.id?`2px solid ${S.accent}`:'2px solid transparent',color:tab===t.id?S.accent:S.muted,padding:'9px 14px',fontFamily:FB,fontSize:'.78rem',fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>{t.l}</button>)}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:16,maxWidth:700,width:'100%',margin:'0 auto'}}>
        {tab==='setup'&&<SetupTab q={q} upd={upd} totalDays={totalDays}/>}
        {tab==='materials'&&<MaterialsTab q={q} upd={upd}/>}
        {tab==='logistics'&&<LogisticsTab q={q} upd={upd}/>}
        {tab==='summary'&&<SummaryTab q={q} calc={calc} totalDays={totalDays} onStatusChange={s=>upd({status:s})} onSave={save}/>}
        {tab==='costs'&&<CostsTab q={q} upd={upd} calc={calc}/>}
        {tab==='notes'&&<div><Lbl ch="Notes"/><CtrlTA value={q.notes} onChange={e=>upd({notes:e.target.value})} rows={8} placeholder="Client context, special requirements, follow-up notes…"/></div>}
      </div>
    </div>
  );
}

// ── Material Row — defined outside render to prevent remounting ────────
function MaterialRow({m, isOpt, onUpdate, onRemove}){
  const total = matTotal(m);
  const addSubItem = () => onUpdate({
    expanded: true,
    subItems: [...(m.subItems||[]), {id:uid(), name:'', qty:1, unitPrice:0}]
  });
  const updSub = (sid, u) => onUpdate({
    subItems: (m.subItems||[]).map(s=>s.id===sid?{...s,...u}:s)
  });
  const remSub = sid => {
    const next = (m.subItems||[]).filter(s=>s.id!==sid);
    onUpdate({subItems:next, expanded:next.length>0});
  };
  return(
    <div style={{borderBottom:`1px solid ${S.border}`,padding:'8px 0'}}>
      <div style={{display:'grid',gridTemplateColumns:'auto 1fr 70px 80px 80px 28px',gap:6,alignItems:'center'}}>
        <input type="checkbox" checked={m.on} onChange={e=>onUpdate({on:e.target.checked})}
          style={{cursor:'pointer',accentColor:S.accent,width:14,height:14,flexShrink:0}}/>
        <span style={{fontSize:'.85rem',fontFamily:FB,color:m.on?S.dark:S.muted}}>{m.name}</span>
        <NumInp value={m.qty} onChange={e=>onUpdate({qty:+e.target.value||0,on:true})} placeholder="qty" style={{opacity:m.on?1:.4}}/>
        <NumInp value={m.unitPrice} onChange={e=>onUpdate({unitPrice:+e.target.value||0,on:true})} placeholder="price" style={{opacity:m.on?1:.4}}/>
        <span style={{fontSize:'.78rem',fontFamily:FM,color:m.on&&total>0?S.dark:S.muted,textAlign:'right',fontWeight:500}}>{total>0?GHS(total):'—'}</span>
        <div style={{display:'flex',gap:3}}>
          <button onClick={()=>onUpdate({expanded:!m.expanded})}
            title={m.expanded?'Collapse':'Expand sub-items'}
            style={{background:'transparent',border:'none',color:m.expanded?S.accent:S.muted,cursor:'pointer',fontSize:'.8rem',padding:'2px',lineHeight:1}}>
            {m.expanded?'▲':'▾'}
          </button>
          {onRemove&&<button onClick={onRemove} style={{background:'transparent',border:'none',color:S.err,cursor:'pointer',fontSize:'.9rem',padding:'2px',lineHeight:1}}>✕</button>}
        </div>
      </div>
      {m.expanded&&(
        <div style={{marginTop:8,marginLeft:20,borderLeft:`2px solid ${S.accentLt}`,paddingLeft:10}}>
          {(m.subItems||[]).map(si=>(
            <div key={si.id} style={{display:'grid',gridTemplateColumns:'1fr 60px 80px 24px',gap:6,alignItems:'center',marginBottom:6}}>
              <TextInp value={si.name} onChange={e=>updSub(si.id,{name:e.target.value})} placeholder="Sub-item name"/>
              <NumInp value={si.qty} onChange={e=>updSub(si.id,{qty:+e.target.value||0})} placeholder="qty"/>
              <NumInp value={si.unitPrice} onChange={e=>updSub(si.id,{unitPrice:+e.target.value||0})} placeholder="unit price"/>
              <button onClick={()=>remSub(si.id)} style={{background:'transparent',border:'none',color:S.err,cursor:'pointer',fontSize:'.9rem'}}>✕</button>
            </div>
          ))}
          <button onClick={addSubItem}
            style={{background:'transparent',border:`1px dashed ${S.border}`,borderRadius:4,padding:'4px 10px',fontFamily:FB,fontSize:'.75rem',color:S.muted,cursor:'pointer',marginTop:4}}>
            + Add sub-item
          </button>
          {(m.subItems||[]).length>0&&<div style={{fontSize:'.72rem',color:S.muted,fontFamily:FM,marginTop:6}}>
            Sub-total: {GHS(total)}
          </div>}
        </div>
      )}
    </div>
  );
}

// ── Materials Tab ──────────────────────────────────────────────────────
function MaterialsTab({q,upd}){
  const [newName,setNewName]=useState('');
  const updMat=(id,u,isOpt)=>{
    if(isOpt) upd({optionals:q.optionals.map(m=>m.id===id?{...m,...u}:m)});
    else upd({materials:q.materials.map(m=>m.id===id?{...m,...u}:m)});
  };
  const addCustom=()=>{
    if(!newName.trim())return;
    upd({materials:[...q.materials,{id:uid(),name:newName.trim(),cab:true,hw:true,on:true,qty:1,unitPrice:0,expanded:false,subItems:[],custom:true}]});
    setNewName('');
  };
  const remCustom=id=>upd({materials:q.materials.filter(m=>m.id!==id)});

  const allMats=[...q.materials,...q.optionals];
  const grandTotal=allMats.filter(m=>m.on).reduce((s,m)=>s+matTotal(m),0);

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <Card ch={<div>
        <div style={{display:'grid',gridTemplateColumns:'auto 1fr 70px 80px 80px 28px',gap:6,alignItems:'center',marginBottom:6,paddingBottom:6,borderBottom:`1px solid ${S.border}`}}>
          <div/>
          <div style={{fontSize:'.65rem',letterSpacing:'.1em',color:S.muted,fontFamily:FM,textTransform:'uppercase'}}>Item</div>
          <div style={{fontSize:'.65rem',letterSpacing:'.1em',color:S.muted,fontFamily:FM,textTransform:'uppercase',textAlign:'center'}}>Qty</div>
          <div style={{fontSize:'.65rem',letterSpacing:'.1em',color:S.muted,fontFamily:FM,textTransform:'uppercase',textAlign:'center'}}>Unit (GH₵)</div>
          <div style={{fontSize:'.65rem',letterSpacing:'.1em',color:S.muted,fontFamily:FM,textTransform:'uppercase',textAlign:'right'}}>Total</div>
          <div/>
        </div>
        <div style={{fontFamily:FM,fontSize:'.65rem',letterSpacing:'.12em',color:S.muted,textTransform:'uppercase',marginBottom:6}}>
          {q.jobType==='cabinetry'?'Cabinetry':'Hardwood'} materials
        </div>
        {q.materials.map(m=>(
          <MaterialRow key={m.id} m={m} isOpt={false}
            onUpdate={u=>updMat(m.id,u,false)}
            onRemove={m.custom?()=>remCustom(m.id):null}/>
        ))}
        <div style={{fontFamily:FM,fontSize:'.65rem',letterSpacing:'.12em',color:S.muted,textTransform:'uppercase',marginTop:14,marginBottom:6}}>Optional add-ons</div>
        {q.optionals.map(m=>(
          <MaterialRow key={m.id} m={m} isOpt={true}
            onUpdate={u=>updMat(m.id,u,true)}
            onRemove={null}/>
        ))}
      </div>}/>

      <Card ch={<div>
        <div style={{fontFamily:FM,fontSize:'.65rem',letterSpacing:'.12em',color:S.muted,textTransform:'uppercase',marginBottom:8}}>Add custom material</div>
        <div style={{display:'flex',gap:8}}>
          <CtrlInp value={newName} onChange={e=>setNewName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addCustom()} placeholder="Material name…" style={{flex:1}}/>
          <Btn ch="Add" onClick={addCustom} size="sm" color={S.accent}/>
        </div>
      </div>}/>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',background:S.dark,borderRadius:10}}>
        <div style={{fontFamily:FM,fontSize:'.68rem',letterSpacing:'.14em',color:'rgba(255,255,255,.5)',textTransform:'uppercase'}}>Materials total</div>
        <div style={{fontFamily:FD,fontSize:'1.3rem',fontWeight:600,color:S.accentLt==='rgba(160,120,74,.12)'?'#c9955f':'#c9955f'}}>{GHS(grandTotal)}</div>
      </div>
    </div>
  );
}

// ── Logistics Tab ──────────────────────────────────────────────────────

  const set=(k,v)=>upd({logistics:{...log,[k]:v}});
  const total=(+log.primary||0)+(+log.secondary||0)*(log.secondaryReturn?2:1)+(+log.siteVisits||0)*(+log.siteVisitCost||0);
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <Card ch={<div style={{display:'flex',flexDirection:'column',gap:12}}>
        <div><Lbl ch="Primary — materials to workshop (GH₵)"/><NumInp value={log.primary||''} onChange={e=>set('primary',e.target.value)}/></div>
        <div>
          <Lbl ch="Secondary — delivery to site (GH₵)"/>
          <NumInp value={log.secondary||''} onChange={e=>set('secondary',e.target.value)} style={{marginBottom:8}}/>
          <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
            <input type="checkbox" checked={log.secondaryReturn||false} onChange={e=>set('secondaryReturn',e.target.checked)} style={{accentColor:S.accent,width:14,height:14}}/>
            <span style={{fontSize:'.82rem',fontFamily:FB,color:S.mid}}>Return trip needed (doubles cost)</span>
          </label>
        </div>
        <div>
          <Lbl ch="Tertiary — site visit trips"/>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <div><div style={{fontSize:'.72rem',color:S.muted,fontFamily:FM,marginBottom:4}}>Number of trips</div><NumInp value={log.siteVisits||''} onChange={e=>set('siteVisits',e.target.value)}/></div>
            <div><div style={{fontSize:'.72rem',color:S.muted,fontFamily:FM,marginBottom:4}}>Cost per trip (GH₵)</div><NumInp value={log.siteVisitCost||''} onChange={e=>set('siteVisitCost',e.target.value)}/></div>
          </div>
        </div>
      </div>}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 16px',background:S.dark,borderRadius:10}}>
        <div style={{fontFamily:FM,fontSize:'.68rem',letterSpacing:'.14em',color:'rgba(255,255,255,.5)',textTransform:'uppercase'}}>Logistics total</div>
        <div style={{fontFamily:FD,fontSize:'1.3rem',fontWeight:600,color:'#c9955f'}}>{GHS(total)}</div>
      </div>
    </div>
  );
}

// ── Summary Tab ────────────────────────────────────────────────────────
function SummaryTab({q,calc,totalDays,onStatusChange,onSave}){
  const activeAddOns=ADDONS.filter(a=>q.addOns?.[a.id]);
  const taxRate   = q.taxRate??15;
  const idleBuf   = q.idleBuffer??20;
  const taxAmt    = calc.grossMargin * (taxRate/100);
  const idleAmt   = calc.grossMargin * (idleBuf/100);
  const netProfit = calc.grossMargin - taxAmt - idleAmt;
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <Card ch={<div>
        <div style={{fontFamily:FM,fontSize:'.65rem',letterSpacing:'.14em',color:S.muted,textTransform:'uppercase',marginBottom:10}}>Cost breakdown</div>
        <Row label="Overhead" value={GHS(calc.overhead)}/>
        <Row label={`  ${totalDays} days × GH₵274`} value="" indent/>
        <Row label="Labour" value={GHS(calc.labour)}/>
        <Row label="Materials" value={GHS(calc.matAmt)}/>
        <Row label="Logistics" value={GHS(calc.logistics)}/>
        <Row label="Total cost" value={GHS(calc.rawCost)} bold/>
      </div>}/>
      <Card ch={<div>
        <div style={{fontFamily:FM,fontSize:'.65rem',letterSpacing:'.14em',color:S.muted,textTransform:'uppercase',marginBottom:10}}>Pricing</div>
        <Row label={`Tier: ${calc.tier.label}`} value={`×${calc.tier.mult}`}/>
        {activeAddOns.map(a=><Row key={a.id} label={a.label} value={`+${a.pct}%`} indent/>)}
        {activeAddOns.length>0&&<Row label="Combined add-on multiplier" value={`×${calc.addOnMult.toFixed(3)}`}/>}
        <div style={{borderTop:`1.5px solid ${S.accent}`,marginTop:12,paddingTop:12}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontFamily:FD,fontSize:'1rem',fontWeight:600,color:S.dark}}>Quoted Price</span>
            <span style={{fontFamily:FD,fontSize:'1.5rem',fontWeight:700,color:S.accent}}>{GHS(calc.quotedPrice)}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:6}}>
            <span style={{fontSize:'.82rem',color:S.muted,fontFamily:FB}}>Gross margin</span>
            <span style={{fontSize:'.82rem',fontFamily:FM,color:calc.marginPct>=30?S.ok:S.warn}}>{GHS(calc.grossMargin)}</span>
          </div>
        </div>
        <MarginBar pct={calc.marginPct}/>
      </div>}/>

      <Card ch={<div>
        <div style={{fontFamily:FM,fontSize:'.65rem',letterSpacing:'.14em',color:S.muted,textTransform:'uppercase',marginBottom:10}}>Projected net profit</div>
        <div style={{fontSize:'.75rem',color:S.muted,fontFamily:FB,marginBottom:12,lineHeight:1.5}}>
          What you might actually keep from this job, after setting aside tax and a reserve for slow months.
        </div>
        <Row label="Gross profit" value={GHS(calc.grossMargin)} bold/>
        <Row label={`Income tax (${taxRate}%)`} value={`− ${GHS(taxAmt)}`} color={S.err} indent/>
        <Row label={`Idle time reserve (${idleBuf}%)`} value={`− ${GHS(idleAmt)}`} color={S.warn} indent/>
        <div style={{borderTop:`2px solid ${S.dark}`,marginTop:10,paddingTop:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontFamily:FD,fontSize:'1rem',fontWeight:600,color:S.dark}}>Projected net</div>
            <div style={{fontSize:'.7rem',color:S.muted,fontFamily:FM,marginTop:2}}>Adjust rates in Setup → Projections</div>
          </div>
          <div style={{fontFamily:FD,fontSize:'1.5rem',fontWeight:700,color:netProfit>=0?S.ok:S.err}}>{GHS(netProfit)}</div>
        </div>
        <div style={{marginTop:12,padding:'10px 12px',background:S.bgAlt,borderRadius:6,fontSize:'.72rem',color:S.mid,fontFamily:FB,lineHeight:1.6}}>
          <strong style={{color:S.dark}}>Note:</strong> The idle reserve isn't lost — it goes into a buffer for months when jobs are slow. Tax is an estimate; speak to an accountant for your actual liability.
        </div>
      </div>}/>

      <Card ch={<div>
        <Lbl ch="Quote status"/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:14}}>
          {Object.entries(STATUS_META).map(([s,m])=>(
            <button key={s} onClick={()=>onStatusChange(s)} style={{background:q.status===s?S.bgAlt:S.surface,border:`1.5px solid ${q.status===s?S.accent:S.border}`,borderRadius:8,padding:'9px 12px',cursor:'pointer',fontFamily:FB,fontSize:'.85rem',fontWeight:600,color:q.status===s?S.accent:S.mid,transition:'all .15s'}}>{m.label}</button>
          ))}
        </div>
        <Btn ch="Save quote" onClick={onSave} full color={S.accent}/>
      </div>}/>
    </div>
  );
}

// ── Costs Tab ──────────────────────────────────────────────────────────
function CostsTab({q,upd,calc}){
  const [form,setForm]=useState({date:new Date().toISOString().slice(0,10),category:'materials',description:'',amount:''});
  const [adding,setAdding]=useState(false);
  const exp=q.expenditure||[];
  const actual=calcActual(exp);
  const totalActual=Object.values(actual).reduce((s,v)=>s+v,0);
  const actualMargin=calc.quotedPrice-totalActual;
  const actualMarginPct=calc.quotedPrice>0?(actualMargin/calc.quotedPrice)*100:0;
  const taxRate=q.taxRate??15;
  const idleBuf=q.idleBuffer??20;
  const actualTax=actualMargin*(taxRate/100);
  const actualIdle=actualMargin*(idleBuf/100);
  const actualNet=actualMargin-actualTax-actualIdle;
  const addEntry=()=>{
    if(!form.amount||!form.description.trim())return;
    upd({expenditure:[...exp,{id:uid(),...form,amount:+form.amount,loggedAt:new Date().toISOString()}]});
    setForm(f=>({...f,description:'',amount:''}));
    setAdding(false);
  };
  const remove=id=>upd({expenditure:exp.filter(e=>e.id!==id)});
  const quoted={materials:calc.matAmt,labour:calc.labour,logistics:calc.logistics,overhead:calc.overhead,other:0};
  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      <Card ch={<div>
        <div style={{fontFamily:FM,fontSize:'.65rem',letterSpacing:'.14em',color:S.muted,textTransform:'uppercase',marginBottom:10}}>Quoted vs Actual</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 80px 80px',gap:4,marginBottom:6}}>
          <div style={{fontSize:'.65rem',color:S.muted,fontFamily:FM}}></div>
          <div style={{fontSize:'.65rem',color:S.muted,fontFamily:FM,textAlign:'right'}}>Quoted</div>
          <div style={{fontSize:'.65rem',color:S.muted,fontFamily:FM,textAlign:'right'}}>Actual</div>
        </div>
        {EXP_CATS.map(cat=>{
          const q_=quoted[cat]||0;
          const a_=actual[cat]||0;
          return(<div key={cat} style={{display:'grid',gridTemplateColumns:'1fr 80px 80px',gap:4,padding:'5px 0',borderBottom:`1px solid ${S.border}`,alignItems:'center'}}>
            <span style={{fontSize:'.82rem',fontFamily:FB,color:S.mid,textTransform:'capitalize'}}>{cat}</span>
            <span style={{fontSize:'.78rem',fontFamily:FM,textAlign:'right'}}>{GHS(q_)}</span>
            <span style={{fontSize:'.78rem',fontFamily:FM,textAlign:'right',color:a_>q_&&q_>0?S.err:S.dark}}>{GHS(a_)}</span>
          </div>);
        })}
        <div style={{paddingTop:10,marginTop:4}}>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}>
            <span style={{fontSize:'.82rem',color:S.muted,fontFamily:FB}}>Quoted price</span>
            <span style={{fontSize:'.82rem',fontFamily:FM}}>{GHS(calc.quotedPrice)}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between'}}>
            <span style={{fontSize:'.82rem',color:S.muted,fontFamily:FB}}>Actual profit so far</span>
            <span style={{fontSize:'.88rem',fontFamily:FM,fontWeight:600,color:actualMargin>=0?S.ok:S.err}}>{GHS(actualMargin)}</span>
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:4,paddingTop:6,borderTop:`1px dashed ${S.border}`}}>
            <span style={{fontSize:'.78rem',color:S.muted,fontFamily:FB}}>Projected net (after tax + reserve)</span>
            <span style={{fontSize:'.85rem',fontFamily:FD,fontWeight:600,color:actualNet>=0?S.ok:S.err}}>{GHS(actualNet)}</span>
          </div>
        </div>
        <MarginBar pct={actualMarginPct} label="Actual margin"/>
        <div style={{fontSize:'.72rem',color:S.muted,fontFamily:FM,marginTop:8}}>{exp.length} entries · {GHS(totalActual)} spent so far</div>
      </div>}/>

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontSize:'.65rem',letterSpacing:'.14em',color:S.muted,fontFamily:FM,textTransform:'uppercase'}}>Expenditure log</div>
        <Btn ch={adding?'Cancel':'+ Log expense'} onClick={()=>setAdding(!adding)} size="sm" outline={adding} color={adding?S.err:S.dark}/>
      </div>

      {adding&&<Card ch={<div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div><Lbl ch="Date"/><CtrlInp value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} type="date"/></div>
          <div><Lbl ch="Category"/><CtrlSel value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{EXP_CATS.map(c=><option key={c} value={c} style={{textTransform:'capitalize'}}>{c}</option>)}</CtrlSel></div>
        </div>
        <div><Lbl ch="Description"/><CtrlInp value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} placeholder="e.g. Timber from Accra Sawmill"/></div>
        <div><Lbl ch="Amount (GH₵)"/><CtrlInp type="number" value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0.00"/></div>
        <div style={{display:'flex',gap:8}}>
          <Btn ch="Log" onClick={addEntry} style={{flex:1}} color={S.accent}/>
          <Btn ch="Cancel" onClick={()=>setAdding(false)} outline style={{flex:1}}/>
        </div>
      </div>}/>}

      <div style={{display:'flex',flexDirection:'column',gap:6}}>
        {[...exp].reverse().map(e=>(
          <div key={e.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 14px',background:S.surface,border:`1.5px solid ${S.border}`,borderRadius:8}}>
            <div>
              <div style={{fontSize:'.85rem',fontFamily:FB,color:S.dark}}>{e.description}</div>
              <div style={{fontSize:'.72rem',color:S.muted,fontFamily:FM,marginTop:2}}>{e.date} · <span style={{textTransform:'capitalize'}}>{e.category}</span></div>
            </div>
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <span style={{fontFamily:FD,fontSize:'1rem',fontWeight:600,color:S.accent}}>{GHS(e.amount)}</span>
              <button onClick={()=>remove(e.id)} style={{background:'transparent',border:'none',color:S.err,cursor:'pointer',fontSize:'1rem'}}>✕</button>
            </div>
          </div>
        ))}
        {exp.length===0&&<div style={{color:S.muted,fontSize:'.85rem',fontFamily:FB,textAlign:'center',padding:'20px 0'}}>No expenses logged yet.</div>}
      </div>
    </div>
  );
}

// ── Root App ───────────────────────────────────────────────────────────
function App(){
  const [ready,setReady]=useState(false);
  const [crew,setCrew]=useState([]);
  const [quotes,setQuotes]=useState([]);
  const [screen,setScreen]=useState('loading');
  const [user,setUser]=useState(null);
  const [activeId,setActiveId]=useState(null);

  useEffect(()=>{
    Promise.all([loadKV('nwd-crew',null),loadKV('nwd-quotes',[])])
      .then(([c,q])=>{
        const crewData=c||[];
        setCrew(crewData);
        setQuotes(q||[]);
        const admin=crewData.find(m=>m.role==='admin'&&m.active);
        if(!admin){setScreen('no-admin');setReady(true);return;}
        const session=getSession();
        if(session&&session.id===admin.id){setUser(admin);setScreen('dashboard');}
        else setScreen('login');
        setReady(true);
      })
      .catch(()=>{setScreen('no-admin');setReady(true);});
  },[]);

  const admin=crew.find(m=>m.role==='admin'&&m.active);
  const saveQuotes=async updated=>{setQuotes(updated);await saveKV('nwd-quotes',updated);};

  const handlePin=async newPin=>{
    let current=admin;
    if(newPin&&!admin.pin){
      const updated=crew.map(c=>c.id===admin.id?{...c,pin:newPin}:c);
      setCrew(updated);
      await saveKV('nwd-crew',updated);
      current=updated.find(c=>c.id===admin.id);
    }
    setUser(current);
    setSession(current);
    setScreen('dashboard');
  };

  const logout=()=>{clearSession();setUser(null);setScreen('login');};

  const createNew=()=>{
    const refNum=quotes.length+1;
    const q=newQuote(refNum);
    setQuotes(prev=>[...prev,q]);
    setActiveId(q.id);
    setScreen('editor');
  };

  const openQuote=id=>{setActiveId(id);setScreen('editor');};

  const saveQuote=async updated=>{
    const next=quotes.map(q=>q.id===updated.id?updated:q);
    await saveQuotes(next);
  };

  if(!ready) return(
    <div style={{minHeight:'100vh',background:S.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:12}}>
      <div style={{fontFamily:FD,fontSize:'1.4rem',fontWeight:600,color:S.dark}}>Neewoody</div>
      <div style={{fontFamily:FM,fontSize:'.7rem',letterSpacing:'.14em',color:S.accent,textTransform:'uppercase'}}>Pricing</div>
      <div style={{fontSize:'.82rem',color:S.muted,fontFamily:FB,marginTop:8}}>Loading…</div>
    </div>
  );

  if(screen==='no-admin') return(
    <div style={{minHeight:'100vh',background:S.bg,display:'flex',alignItems:'center',justifyContent:'center',padding:32}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontFamily:FD,fontSize:'1.4rem',color:S.dark,marginBottom:8}}>Neewoody Pricing</div>
        <div style={{fontSize:'.85rem',color:S.err,fontFamily:FB,marginBottom:6}}>Cannot connect to server.</div>
        <div style={{fontSize:'.78rem',color:S.muted,fontFamily:FM}}>Check that the Cloudflare Worker is deployed and the route is active.</div>
        <button onClick={()=>window.location.reload()} style={{marginTop:16,background:S.dark,color:'#fff',border:'none',borderRadius:6,padding:'8px 18px',fontFamily:FB,fontWeight:600,fontSize:'.85rem',cursor:'pointer'}}>Retry</button>
      </div>
    </div>
  );

  if(screen==='login'&&admin) return <PinScreen user={admin} onSuccess={handlePin} onBack={null}/>;

  if(screen==='dashboard') return <Dashboard quotes={quotes} onNew={createNew} onOpen={openQuote} onLogout={logout}/>;

  if(screen==='editor'){
    const q=quotes.find(x=>x.id===activeId);
    if(!q) return null;
    return <QuoteEditor quote={q} onSave={async updated=>{await saveQuote(updated);}} onBack={()=>setScreen('dashboard')}/>;
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
