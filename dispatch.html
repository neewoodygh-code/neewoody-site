// ── Push helpers ──────────────────────────────────────────────────────
function urlB64ToUint8(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = window.atob(base64);
  return Uint8Array.from(raw, c => c.charCodeAt(0));
}

async function registerPush(crewId) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8(VAPID_PK),
      });
    }
    await apiFetch('/subscribe', 'POST', { crewId, subscription: sub.toJSON() });
  } catch (e) {
    console.warn('Push registration failed:', e.message);
  }
}

async function notify(crewIds, title, body) {
  if (!crewIds?.length) return;
  try { await apiFetch('/notify', 'POST', { crewIds, title, body }); }
  catch (e) { console.warn('Notify failed:', e.message); }
}

// ── API ───────────────────────────────────────────────────────────────
async function apiFetch(path, method = 'GET', body) {
  const opts = {
    method,
    headers: { 'X-NWD-Key': API_KEY, ...(body ? { 'Content-Type': 'application/json' } : {}) },
    ...(body ? { body: JSON.stringify(body) } : {}),
  };
  const r = await fetch(`${API}${path}`, opts);
  return r.json();
}

async function load(key, fb) {
  try { const d = await apiFetch(`/${key}`); return d !== null ? d : fb; }
  catch { return fb; }
}
async function save(key, data) {
  try { await apiFetch(`/${key}`, 'PUT', data); } catch (e) { console.error(e); }
}

// ── PIN Screen ────────────────────────────────────────────────────────
function PinScreen({user,onSuccess,onBack}){
  const isFirst=!user.pin;
  const [step,setStep]=useState('enter');
  const [p1,setP1]=useState('');
  const [p2,setP2]=useState('');
  const [shake,setShake]=useState(false);
  const cur=step==='confirm'?p2:p1;
  const press=d=>{
    if(step==='enter'){
      if(p1.length>=4) return;
      const np=p1+d; setP1(np);
      if(np.length===4){
        if(isFirst) setStep('confirm');
        else if(np===user.pin) onSuccess();
        else{setShake(true);setTimeout(()=>{setP1('');setShake(false);},700);}
      }
    } else {
      if(p2.length>=4) return;
      const np=p2+d; setP2(np);
      if(np.length===4){
        if(np===p1) onSuccess(np);
        else{setShake(true);setTimeout(()=>{setP2('');setShake(false);},700);}
      }
    }
  };
  const del=()=>{if(step==='enter')setP1(p=>p.slice(0,-1));else setP2(p=>p.slice(0,-1));};
  return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
      <div style={{width:'100%',maxWidth:280}}>
        <div style={{fontFamily:BF,fontSize:9,letterSpacing:5,color:C.muted,textAlign:'center',marginBottom:6}}>{user.name.toUpperCase()}</div>
        <div style={{fontSize:11,color:C.muted,textAlign:'center',marginBottom:30,fontFamily:MF}}>
          {isFirst?(step==='enter'?'Choose a 4-digit PIN':'Confirm your PIN'):'Enter your PIN'}
        </div>
        <div style={{display:'flex',gap:14,justifyContent:'center',marginBottom:34,transform:shake?'translateX(6px)':'none',transition:'transform .08s'}}>
          {[0,1,2,3].map(i=><div key={i} style={{width:11,height:11,borderRadius:'50%',background:cur.length>i?(shake?C.err:C.acc):C.bdr,transition:'background .15s'}}/>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:8}}>
          {[1,2,3,4,5,6,7,8,9].map(n=>(
            <button key={n} onClick={()=>press(String(n))} style={{background:C.s1,border:`1px solid ${C.bdr}`,borderRadius:2,color:C.txt,padding:15,fontFamily:MF,fontSize:18,cursor:'pointer'}}>{n}</button>
          ))}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8}}>
          <div/>
          <button onClick={()=>press('0')} style={{background:C.s1,border:`1px solid ${C.bdr}`,borderRadius:2,color:C.txt,padding:15,fontFamily:MF,fontSize:18,cursor:'pointer'}}>0</button>
          <button onClick={del} style={{background:'transparent',border:`1px solid ${C.bdr}`,borderRadius:2,color:C.muted,padding:15,fontSize:14,cursor:'pointer'}}>⌫</button>
        </div>
        <button onClick={()=>{if(step==='confirm'){setStep('enter');setP2('');}else onBack();}} style={{display:'block',width:'100%',marginTop:18,background:'transparent',border:'none',color:C.muted,fontSize:11,cursor:'pointer',fontFamily:MF}}>
          ← {step==='confirm'?'re-enter':'back'}
        </button>
      </div>
    </div>
  );
}

function DamageTab({damage,saveDamage,crew,tools,saveTools}){
  const open=damage.filter(d=>d.status!=='resolved');
  const resolved=damage.filter(d=>d.status==='resolved');
  const update=(id,u)=>saveDamage(damage.map(d=>d.id===id?{...d,...u}:d));
  const resolve=(id,note)=>{const d=damage.find(x=>x.id===id);update(id,{status:'resolved',resolutionNote:note,resolvedAt:new Date().toISOString()});if(d?.toolId)saveTools(tools.map(t=>t.id===d.toolId?{...t,condition:'good'}:t));};
  return(
    <div>
      <div style={{fontSize:9,letterSpacing:2,color:C.muted,fontFamily:MF,marginBottom:16}}>{open.length} OPEN · {resolved.length} RESOLVED</div>
      {open.map(d=><DmgCard key={d.id} d={d} crew={crew} onUpdate={u=>update(d.id,u)} onResolve={note=>resolve(d.id,note)}/>)}
      {open.length===0&&<div style={{color:C.ok,fontSize:12,fontFamily:MF,marginBottom:16}}>All clear.</div>}
      {resolved.map(d=><Card key={d.id} ch={<div><div style={{fontFamily:BF,fontSize:14,color:C.muted}}>{d.toolName}</div><div style={{fontSize:10,color:C.muted,fontFamily:MF}}>{d.description} · {d.resolvedAt?fmtDate(d.resolvedAt):''}</div></div>} style={{marginBottom:6,opacity:.6}}/>)}
    </div>
  );
}

// ── Job Screen ────────────────────────────────────────────────────────
function JobScreen({jobId,user,crew,jobs,tools,damage,saveJobs,saveDamage,saveTools,onBack}){
  const job=jobs.find(j=>j.id===jobId);
  if(!job) return <div style={{padding:20,color:C.err,fontFamily:MF}}>Job not found.</div>;
  const updateJob=updates=>saveJobs(jobs.map(j=>j.id===jobId?{...j,...updates}:j));
  const isAdmin=user.role==='admin';
  const isFieldSup=job.fieldSupId===user.id||user.role==='supervisor'||user.role==='admin';
  const isCrew=job.crewIds?.includes(user.id)||isAdmin;
  const getFieldSup=()=>crew.find(c=>c.id===job.fieldSupId)?.name||'Not assigned';
  const getCrew=()=>(job.crewIds||[]).map(id=>crew.find(c=>c.id===id)?.name).filter(Boolean);
  const otherCrew=()=>(job.crewIds||[]).filter(id=>id!==user.id);

  const [gpsMsg,setGpsMsg]=useState('');
  const [gpsOk,setGpsOk]=useState(false);
  const [loading,setLoading]=useState(false);
  const [tab,setTab]=useState('overview');
  const getGPS=()=>new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:12000}));

  const adminIds=crew.filter(c=>c.role==='admin').map(c=>c.id);

  const triggerDepart=async()=>{
    setLoading(true);setGpsMsg('Checking GPS…');
    try{
      const pos=await getGPS();
      const updates={status:'departed',departedAt:new Date().toISOString(),departLat:pos.coords.latitude,departLng:pos.coords.longitude};
      updateJob(updates);
      notify(otherCrew(),`${job.client} — En route`,`Departed. ETA to site: check with ${getFieldSup()}.`);
      notify(adminIds,`Job departed`,`${job.client} crew is en route.`);
      setGpsMsg('Departed.');setGpsOk(true);
    }catch{setGpsMsg('GPS unavailable.');setGpsOk(false);}
    setLoading(false);
  };
  const checkArrival=async()=>{
    setLoading(true);setGpsMsg('Checking GPS…');
    try{
      const pos=await getGPS();
      const {latitude:lat,longitude:lng}=pos.coords;
      if(!job.siteLat||!job.siteLng){
        updateJob({status:'on-site',arrivedAt:new Date().toISOString()});
        notify(adminIds,'On site',`${job.client} crew has arrived.`);
        setGpsMsg('Arrived.');setGpsOk(true);setLoading(false);return;
      }
      const dist=Math.round(haversine(lat,lng,job.siteLat,job.siteLng));
      if(dist<=job.geofenceRadius){
        updateJob({status:'on-site',arrivedAt:new Date().toISOString()});
        notify(adminIds,'On site',`${job.client} crew arrived — ${dist}m from site.`);
        setGpsMsg(`Arrived — ${dist}m.`);setGpsOk(true);
      } else {setGpsMsg(`${dist}m from site. Must be within ${job.geofenceRadius}m.`);setGpsOk(false);}
    }catch{setGpsMsg('GPS unavailable.');setGpsOk(false);}
    setLoading(false);
  };
  const triggerReturnCheck=async()=>{
    setLoading(true);setGpsMsg('Verifying location…');
    try{
      const pos=await getGPS();
      const {latitude:lat,longitude:lng}=pos.coords;
      if(!job.siteLat||!job.siteLng){
        updateJob({status:'return-check',returnStartedAt:new Date().toISOString()});
        notify(otherCrew(),'Return check',`${job.client} — Begin packing up and returning tools.`);
        setGpsOk(true);setLoading(false);return;
      }
      const dist=Math.round(haversine(lat,lng,job.siteLat,job.siteLng));
      if(dist<=job.geofenceRadius*1.5){
        updateJob({status:'return-check',returnStartedAt:new Date().toISOString()});
        notify(otherCrew(),'Return check started',`${job.client} — Account for all tools before leaving site.`);
        setGpsMsg('Return check started.');setGpsOk(true);
      } else {setGpsMsg(`Must be at site. ${dist}m away.`);setGpsOk(false);}
    }catch{setGpsMsg('GPS unavailable.');setGpsOk(false);}
    setLoading(false);
  };

  const cl=job.checklist||[];
  const packed=cl.filter(i=>i.packed).length;
  const returned=cl.filter(i=>i.returned).length;
  const allPacked=cl.length>0&&packed===cl.length;
  const allReturned=cl.length>0&&returned===cl.length;

  const packItem=itemId=>updateJob({checklist:cl.map(i=>i.id===itemId?{...i,packed:!i.packed,packedBy:user.name,packedAt:new Date().toISOString()}:i)});
  const returnItem=(itemId,condition,note)=>{
    updateJob({checklist:cl.map(i=>i.id===itemId?{...i,returned:true,returnedBy:user.name,returnedAt:new Date().toISOString(),condition,conditionNote:note||''}:i)});
    if(condition==='damaged'||condition==='missing'){
      const item=cl.find(i=>i.id===itemId);
      saveDamage([...damage,{id:uid(),toolId:item?.toolId,toolName:item?.name,jobId:job.id,jobClient:job.client,reportedBy:user.name,reportedAt:new Date().toISOString(),description:note||'',action:null,responsibleId:null,status:'open'}]);
      if(item?.toolId) saveTools(tools.map(t=>t.id===item.toolId?{...t,condition:'needs_attention'}:t));
      notify(adminIds,'Tool issue',`${item?.name} returned ${condition} on ${job.client} job.`);
    }
  };
  const closeJob=()=>{
    if(cl.filter(i=>!i.returned).length>0){alert('All items must be returned before closing.');return;}
    updateJob({status:'closed',closedAt:new Date().toISOString()});
    notify(adminIds,'Job closed',`${job.client} is wrapped up.`);
  };
  const addMishap=m=>updateJob({mishaps:[...(job.mishaps||[]),{id:uid(),...m,loggedBy:user.name,loggedAt:new Date().toISOString()}]});
  const toggleMrItem=id=>updateJob({marketRun:(job.marketRun||[]).map(m=>m.id===id?{...m,done:!m.done}:m)});
  const addMrItem=item=>updateJob({marketRun:[...(job.marketRun||[]),{id:uid(),item,done:false,addedBy:user.name}]});

  const TABS=[{id:'overview',l:'Overview'},{id:'checklist',l:`Checklist (${packed}/${cl.length})`},{id:'marketrun',l:'Market Run'},{id:'mishaps',l:`Mishaps${(job.mishaps||[]).length?` (${job.mishaps.length})`:''}`}];

  return(
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <Hdr title={job.client} sub={<><SPill status={job.status}/> · {job.jobType}</>} onBack={onBack}
        right={job.status==='on-site'&&<Btn ch="+ Mishap" onClick={()=>setTab('mishaps')} size="sm" color={C.warn}/>}/>
      <div style={{display:'flex',borderBottom:`1px solid ${C.bdr}`,overflowX:'auto',flexShrink:0}}>
        {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:'transparent',border:'none',marginBottom:-1,borderBottom:tab===t.id?`2px solid ${C.acc}`:'2px solid transparent',color:tab===t.id?C.txt:C.muted,padding:'9px 13px',fontFamily:BF,fontSize:11,letterSpacing:1.5,cursor:'pointer',whiteSpace:'nowrap',textTransform:'uppercase'}}>{t.l}</button>)}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:18}}>
        {tab==='overview'&&(
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <Card ch={<div>
              <div style={{fontFamily:BF,fontSize:11,letterSpacing:2,color:C.muted,marginBottom:10}}>JOB DETAILS</div>
              {[['Client',job.client],['Type',job.jobType==='cabinetry'?'Cabinetry':'Hardwood'],['Site',job.siteAddress||'TBC'],['Departure',job.departureTime?fmtDepart(job.departureTime):'TBC'],['Field sup',getFieldSup()],['Crew',getCrew().join(', ')||'None']].map(([k,v])=>(
                <div key={k} style={{display:'flex',gap:8,padding:'5px 0',borderBottom:`1px solid ${C.bdr}`,fontSize:12,fontFamily:MF}}>
                  <span style={{color:C.muted,minWidth:90,flexShrink:0}}>{k}</span><span>{v}</span>
                </div>
              ))}
              {job.arrivedAt&&<div style={{display:'flex',gap:8,padding:'5px 0',fontSize:12,fontFamily:MF}}><span style={{color:C.muted,minWidth:90}}>On site for</span><span>{elapsed(job.arrivedAt)}</span></div>}
              {job.notes&&<div style={{marginTop:10,fontSize:11,color:C.muted,fontFamily:MF,lineHeight:1.6}}>{job.notes}</div>}
            </div>}/>
            {gpsMsg&&<div style={{fontSize:11,color:gpsOk?C.ok:C.warn,textAlign:'center',padding:'6px 0',fontFamily:MF}}>{gpsMsg}</div>}
            {job.status==='created'&&isFieldSup&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
              <Btn ch="Go to Checklist →" onClick={()=>setTab('checklist')} full outline/>
              <Btn ch="Move to Pre-departure →" onClick={()=>updateJob({status:'pre-departure'})} full disabled={!job.checklistLocked}/>
              {!job.checklistLocked&&<div style={{fontSize:10,color:C.warn,textAlign:'center',fontFamily:MF}}>Lock the checklist before proceeding</div>}
            </div>}
            {job.status==='pre-departure'&&isFieldSup&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{fontSize:12,fontFamily:MF,textAlign:'center',color:allPacked?C.ok:C.muted}}>{allPacked?'✓ All items packed':`${packed}/${cl.length} packed`}</div>
              <Btn ch={loading?'⟳ Checking GPS…':'Confirm Departure (GPS gated)'} onClick={triggerDepart} full disabled={!allPacked||loading} color={C.ok}/>
            </div>}
            {job.status==='departed'&&isCrew&&<Btn ch={loading?'⟳ Checking GPS…':'Confirm Arrival at Site'} onClick={checkArrival} full disabled={loading} color={C.ok}/>}
            {job.status==='on-site'&&isFieldSup&&<Btn ch={loading?'⟳ Verifying GPS…':'Begin Return Check'} onClick={triggerReturnCheck} full disabled={loading} color={C.warn}/>}
            {job.status==='return-check'&&isFieldSup&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{fontSize:12,fontFamily:MF,textAlign:'center',color:allReturned?C.ok:C.muted}}>{allReturned?'✓ All items accounted for':`${returned}/${cl.length} returned`}</div>
              <Btn ch="Close Job" onClick={closeJob} full disabled={!allReturned} color={C.ok}/>
            </div>}
            {job.status==='closed'&&<div style={{textAlign:'center',padding:20}}>
              <div style={{fontFamily:BF,fontSize:26,fontWeight:700,color:C.ok}}>JOB COMPLETE</div>
              <div style={{fontSize:11,color:C.muted,fontFamily:MF,marginTop:6}}>Closed {job.closedAt?fmtDate(job.closedAt):''}</div>
            </div>}
          </div>
        )}
        {tab==='checklist'&&<ChecklistTab job={job} user={user} isFieldSup={isFieldSup} updateJob={updateJob} onPackItem={packItem} onReturnItem={returnItem}/>}
        {tab==='marketrun'&&<MarketRunTab job={job} onToggle={toggleMrItem} onAdd={addMrItem}/>}
        {tab==='mishaps'&&<MishapsTab job={job} user={user} crew={crew} onAdd={addMishap}/>}
      </div>
    </div>
  );
}

function ChecklistTab({job,user,isFieldSup,updateJob,onPackItem,onReturnItem}){
  const cl=job.checklist||[];
  const isReturn=job.status==='return-check';
  const isPre=job.status==='pre-departure';
  const canEdit=isFieldSup&&!job.checklistLocked&&job.status==='created';
  const [adding,setAdding]=useState(false);
  const [newItem,setNewItem]=useState({name:'',cat:'power',qty:1});
  const [retStates,setRetStates]=useState({});
  const cats=['power','hand','consumable'];
  const packed=cl.filter(i=>i.packed).length;
  const returned=cl.filter(i=>i.returned).length;
  const addItem=()=>{if(!newItem.name.trim())return;updateJob({checklist:[...cl,{id:uid(),toolId:null,name:newItem.name.trim(),cat:newItem.cat,qty:newItem.qty,packed:false,packedBy:null,packedAt:null,returned:false,returnedBy:null,returnedAt:null,condition:'good',conditionNote:''}]});setNewItem({name:'',cat:'power',qty:1});setAdding(false);};
  const removeItem=id=>updateJob({checklist:cl.filter(i=>i.id!==id)});
  const setRS=(id,u)=>setRetStates(s=>({...s,[id]:{...s[id],...u}}));
  const confirmReturn=item=>{
    const rs=retStates[item.id]||{};
    const cond=rs.condition||'good';
    if((cond==='damaged'||cond==='missing')&&!rs.note){alert('A note is required.');return;}
    onReturnItem(item.id,cond,rs.note);
    setRetStates(s=>({...s,[item.id]:{...s[item.id],open:false}}));
  };
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:11,fontFamily:MF,color:C.muted}}>{isReturn?`${returned}/${cl.length} returned`:`${packed}/${cl.length} packed`}</div>
        <div style={{display:'flex',gap:6}}>
          {canEdit&&!adding&&<Btn ch="+ Item" onClick={()=>setAdding(true)} size="sm" outline/>}
          {isFieldSup&&job.status==='created'&&<Btn ch={job.checklistLocked?'🔓 Unlock':'🔒 Lock'} onClick={()=>updateJob({checklistLocked:!job.checklistLocked})} size="sm" color={job.checklistLocked?C.warn:C.ok}/>}
        </div>
      </div>
      {job.checklistLocked&&job.status==='created'&&<div style={{fontSize:10,color:C.ok,fontFamily:MF,marginBottom:12}}>✓ Checklist locked.</div>}
      {adding&&<Card ch={<div style={{display:'flex',flexDirection:'column',gap:8}}>
        <Inp placeholder="Tool name" value={newItem.name} onChange={e=>setNewItem(f=>({...f,name:e.target.value}))}/>
        <div style={{display:'flex',gap:8}}>
          <Sel value={newItem.cat} onChange={e=>setNewItem(f=>({...f,cat:e.target.value}))} style={{flex:1}}><option value="power">Power</option><option value="hand">Hand</option><option value="consumable">Consumable</option></Sel>
          <Inp type="number" min={1} value={newItem.qty} onChange={e=>setNewItem(f=>({...f,qty:+e.target.value}))} style={{width:60}}/>
        </div>
        <div style={{display:'flex',gap:8}}><Btn ch="Add" onClick={addItem} style={{flex:1}}/><Btn ch="Cancel" onClick={()=>setAdding(false)} outline style={{flex:1}}/></div>
      </div>} style={{marginBottom:14}}/>}
      {cats.map(cat=>{
        const items=cl.filter(i=>i.cat===cat); if(!items.length) return null;
        return(<div key={cat} style={{marginBottom:20}}>
          <div style={{fontSize:9,letterSpacing:2,color:C.acc,textTransform:'uppercase',fontFamily:MF,marginBottom:8}}>{cat}</div>
          {items.map(item=>{
            const rs=retStates[item.id]||{};
            const isGood=(isPre&&item.packed)||(isReturn&&item.returned);
            return(<Card key={item.id} ch={<div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{flex:1}}>
                  <div style={{fontFamily:BF,fontSize:15,fontWeight:600,color:isGood?C.ok:C.txt}}>{item.name}</div>
                  <div style={{fontSize:10,color:C.muted,fontFamily:MF}}>qty {item.qty}{item.packed&&` · ${item.packedBy}`}{item.returned&&<> · <span style={{color:item.condition==='good'?C.ok:C.warn}}>{item.condition}</span></>}</div>
                </div>
                <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
                  {canEdit&&<button onClick={()=>removeItem(item.id)} style={{background:'transparent',border:'none',color:C.err,cursor:'pointer',fontSize:14}}>✕</button>}
                  {isPre&&!item.packed&&<Btn ch="Packed ✓" onClick={()=>onPackItem(item.id)} size="sm" color={C.ok}/>}
                  {isPre&&item.packed&&<span style={{fontSize:10,color:C.ok,fontFamily:MF}}>✓</span>}
                  {isReturn&&!item.returned&&<Btn ch={rs.open?'Cancel':'Return'} onClick={()=>setRS(item.id,{open:!rs.open})} size="sm" color={C.warn}/>}
                  {isReturn&&item.returned&&<span style={{fontSize:10,color:item.condition==='good'?C.ok:C.warn,fontFamily:MF}}>✓</span>}
                </div>
              </div>
              {isReturn&&rs.open&&!item.returned&&<div style={{marginTop:10,display:'flex',flexDirection:'column',gap:8}}>
                <div style={{display:'flex',gap:6}}>
                  {['good','damaged','missing'].map(c=><button key={c} onClick={()=>setRS(item.id,{condition:c})} style={{flex:1,background:(rs.condition||'good')===c?C.acc:C.s2,color:(rs.condition||'good')===c?C.bg:C.muted,border:`1px solid ${C.bdr}`,borderRadius:2,padding:'6px 4px',fontFamily:MF,fontSize:10,cursor:'pointer',textTransform:'capitalize'}}>{c}</button>)}
                </div>
                {(rs.condition==='damaged'||rs.condition==='missing')&&<TA value={rs.note||''} onChange={e=>setRS(item.id,{note:e.target.value})} placeholder="Describe the issue…" rows={2}/>}
                <Btn ch="Confirm Return" onClick={()=>confirmReturn(item)} full size="sm"/>
              </div>}
            </div>}/>);
          })}
        </div>);
      })}
    </div>
  );
}

function MarketRunTab({job,onToggle,onAdd}){
  const [item,setItem]=useState('');
  const items=job.marketRun||[];
  const add=()=>{if(item.trim()){onAdd(item.trim());setItem('');}};
  return(
    <div>
      <div style={{display:'flex',gap:8,marginBottom:14}}><Inp value={item} onChange={e=>setItem(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} placeholder="Add item…"/><Btn ch="Add" onClick={add} size="sm"/></div>
      {items.map(m=>(
        <button key={m.id} onClick={()=>onToggle(m.id)} style={{background:m.done?C.s2:C.s1,border:`1px solid ${C.bdr}`,borderRadius:2,padding:'11px 13px',display:'flex',alignItems:'center',gap:10,cursor:'pointer',color:m.done?C.muted:C.txt,textAlign:'left',width:'100%',marginBottom:6}}>
          <div style={{width:16,height:16,borderRadius:'50%',border:`1.5px solid ${m.done?C.ok:C.bdr}`,background:m.done?C.ok:'transparent',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,color:C.bg}}>{m.done?'✓':''}</div>
          <span style={{fontFamily:MF,fontSize:13,textDecoration:m.done?'line-through':'none'}}>{m.item}</span>
          {m.addedBy&&<span style={{fontSize:9,color:C.muted,marginLeft:'auto',fontFamily:MF}}>+{m.addedBy}</span>}
        </button>
      ))}
      {items.length===0&&<div style={{color:C.muted,fontSize:12,fontFamily:MF}}>No market run items.</div>}

}

function MishapsTab({job,user,crew,onAdd}){
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({category:'missing-tool',description:'',impact:'time',accountableId:'',resolution:''});
  const cats=['missing-tool','damaged-tool','material','timing','other'];
  const submit=()=>{if(!form.description.trim())return;onAdd(form);setForm({category:'missing-tool',description:'',impact:'time',accountableId:'',resolution:''});setAdding(false);};
  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:9,letterSpacing:2,color:C.muted,fontFamily:MF}}>{(job.mishaps||[]).length} LOGGED</div>
        {job.status!=='closed'&&<Btn ch="+ Log Mishap" onClick={()=>setAdding(!adding)} size="sm" color={C.warn}/>}
      </div>
      {adding&&<Card ch={<div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div><Lbl ch="Category"/><Sel value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>{cats.map(c=><option key={c} value={c}>{c.replace(/-/g,' ')}</option>)}</Sel></div>
        <div><Lbl ch="What happened"/><TA value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} rows={3} placeholder="Full description — this becomes institutional memory."/></div>
        <div><Lbl ch="Impact"/><Sel value={form.impact} onChange={e=>setForm(f=>({...f,impact:e.target.value}))}><option value="time">Time lost</option><option value="cost">Cost incurred</option><option value="both">Both</option></Sel></div>
        <div><Lbl ch="Accountable"/><Sel value={form.accountableId} onChange={e=>setForm(f=>({...f,accountableId:e.target.value}))}><option value="">Not specified</option>{crew.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}</Sel></div>
        <div><Lbl ch="Resolution"/><TA value={form.resolution} onChange={e=>setForm(f=>({...f,resolution:e.target.value}))} rows={2} placeholder="How was it handled?"/></div>
        <div style={{display:'flex',gap:8}}><Btn ch="Log" onClick={submit} style={{flex:1}} color={C.warn}/><Btn ch="Cancel" onClick={()=>setAdding(false)} outline style={{flex:1}}/></div>
      </div>} style={{marginBottom:16}}/>}
      {(job.mishaps||[]).map(m=>{
        const accountable=crew.find(c=>c.id===m.accountableId)?.name;
        return(<Card key={m.id} ch={<div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:4}}><span style={{fontSize:9,letterSpacing:1.5,color:C.warn,fontFamily:BF,fontWeight:700}}>{m.category.replace(/-/g,' ').toUpperCase()}</span><span style={{fontSize:10,color:C.muted,fontFamily:MF}}>{m.loggedAt?fmtTime(m.loggedAt):''} · {m.loggedBy}</span></div>
          <div style={{fontSize:13,fontFamily:MF,marginBottom:6,lineHeight:1.5}}>{m.description}</div>
          <div style={{fontSize:10,color:C.muted,fontFamily:MF}}>Impact: {m.impact}{accountable&&` · ${accountable}`}{m.resolution&&` · ${m.resolution}`}</div>
        </div>} style={{marginBottom:8}}/>);
      })}
      {(job.mishaps||[]).length===0&&<div style={{color:C.muted,fontSize:12,fontFamily:MF}}>No mishaps logged.</div>}
    </div>
  );
}

// ── Root App ──────────────────────────────────────────────────────────
function App(){
  const [ready,setReady]=useState(false);
  const [crew,setCrew]=useState([]);
  const [tools,setTools]=useState([]);
  const [jobs,setJobs]=useState([]);
  const [damage,setDamage]=useState([]);
  const [screen,setScreen]=useState('home');
  const [params,setParams]=useState({});
  const [user,setUser]=useState(null);
  const [refreshing,setRefreshing]=useState(false);

  const refreshJobs=async()=>{
    setRefreshing(true);
    const [j,d]=await Promise.all([load('nwd-jobs',[]),load('nwd-damage',[])]);
    setJobs(j);setDamage(d);
    setRefreshing(false);
  };

  useEffect(()=>{
    // Register service worker
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').catch(e=>console.warn('SW reg failed:',e));
    }
    Promise.all([load('nwd-crew',null),load('nwd-tools',null),load('nwd-jobs',[]),load('nwd-damage',[])]).then(([c,t,j,d])=>{
      const crewData=c||DEFAULT_CREW;
      const toolData=t||DEFAULT_TOOLS;
      setCrew(crewData);setTools(toolData);setJobs(j);setDamage(d);
      const session=getSession();
      if(session){
        const current=crewData.find(m=>m.id===session.id);
        if(current&&current.active){
          setUser(current);
          const r=current.role;
          setScreen(r==='admin'?'adminDash':r==='supervisor'||r==='lead'?'supervisorDash':'crewDash');
        }
      }
      setReady(true);
    });
    // Refresh jobs when app comes back into view (phone switching back to app)
    const onVisible=()=>{ if(document.visibilityState==='visible') refreshJobs(); };
    document.addEventListener('visibilitychange',onVisible);
    return ()=>document.removeEventListener('visibilitychange',onVisible);
  },[]);

  const saveCrew=async d=>{setCrew(d);await save('nwd-crew',d);};
  const saveTools=async d=>{setTools(d);await save('nwd-tools',d);};
  const saveJobs=async d=>{setJobs(d);await save('nwd-jobs',d);};
  const saveDamage=async d=>{setDamage(d);await save('nwd-damage',d);};
  const go=(sc,p={})=>{setScreen(sc);setParams(p);};
  const logout=()=>{clearSession();setUser(null);go('home');};
  const handleSelect=member=>{setUser(member);go('pin',{member});};
  const handlePin=async newPin=>{
    let current=params.member;
    if(newPin&&!params.member.pin){
      const updated=crew.map(c=>c.id===params.member.id?{...c,pin:newPin}:c);
      await saveCrew(updated);
      current=updated.find(c=>c.id===params.member.id);
      setUser(current);
    }
    setSession(current);
    // Request notification permission and register push subscription
    if('Notification' in window && Notification.permission === 'default'){
      const perm = await Notification.requestPermission();
      if(perm === 'granted') await registerPush(current.id);
    } else if(Notification.permission === 'granted'){
      await registerPush(current.id);
    }
    const r=current.role;
    go(r==='admin'?'adminDash':r==='supervisor'||r==='lead'?'supervisorDash':'crewDash');
  };
  const createJob=async job=>{
    const updated=[...jobs,job];
    await saveJobs(updated);
    // Notify assigned crew
    notify(job.crewIds,`New job: ${job.client}`,`Depart ${job.departureTime?fmtDepart(job.departureTime):'TBC'} · ${job.siteAddress}`);
    go('jobView',{jobId:job.id});
  };
  const jobBack=()=>{
    if(!user) return go('home');
    const r=user.role;
    go(r==='admin'?'adminDash':r==='supervisor'||r==='lead'?'supervisorDash':'crewDash');
  };

  if(!ready) return(
    <div style={{minHeight:'100vh',background:C.bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16}}>
      <div style={{width:36,height:3,background:C.acc}}/>
      <div style={{fontFamily:BF,fontSize:9,letterSpacing:5,color:C.muted}}>NEEWOODY DISPATCH</div>
      <div style={{fontSize:11,color:C.muted,fontFamily:MF}}>Loading…</div>
    </div>
  );

  const jobProps={user,crew,jobs,tools,damage,saveJobs,saveDamage,saveTools};
  return(
    <div style={{minHeight:'100vh',background:C.bg,color:C.txt,fontFamily:MF}}>
      {screen==='home'&&<HomeScreen crew={crew} onSelect={handleSelect}/>}
      {screen==='pin'&&params.member&&<PinScreen user={params.member} onSuccess={handlePin} onBack={()=>{setUser(null);go('home');}}/>}
      {screen==='adminDash'&&user&&<AdminDash {...{user,crew,tools,jobs,damage,saveCrew,saveTools,saveJobs,saveDamage}} onCreateJob={()=>go('createJob')} onViewJob={id=>go('jobView',{jobId:id})} onLogout={logout}/>}
      {screen==='createJob'&&<CreateJobScreen crew={crew} tools={tools} onSave={createJob} onBack={()=>go('adminDash')}/>}
      {screen==='jobView'&&user&&<JobScreen {...jobProps} jobId={params.jobId} onBack={jobBack}/>}
      {screen==='supervisorDash'&&user&&<SupervisorDash user={user} crew={crew} jobs={jobs} onViewJob={id=>go('jobView',{jobId:id})} onLogout={logout} onRefresh={refreshJobs} refreshing={refreshing}/>}
      {screen==='crewDash'&&user&&<CrewDash user={user} crew={crew} jobs={jobs} onViewJob={id=>go('jobView',{jobId:id})} onLogout={logout} onRefresh={refreshJobs} refreshing={refreshing}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
